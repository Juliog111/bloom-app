# netlify.toml
# BLOOM App — Netlify deployment config

[build]
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/sage"
  to = "/.netlify/functions/sage"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
